# ============================================
# LiteLLM Proxy Configuration - MyCrew Gateway
# ============================================
# Gerencia roteamento para: Ollama, OpenRouter, OpenAI, Gemini, Groq
# Documentacao: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # ----- Ollama (local) -----
  - model_name: ollama
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://ollama:11434
      rpm: 60
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: ollama
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434
      rpm: 60
    model_info:
      mode: embedding

  # ----- OpenAI -----
  - model_name: openai
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      rpm: 500
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: openai
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      rpm: 500
    model_info:
      mode: chat
      supports_function_calling: true

  # ----- OpenRouter -----
  - model_name: openrouter
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: openrouter
    litellm_params:
      model: openrouter/google/gemini-2.0-flash-001
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: openrouter
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200
    model_info:
      mode: chat
      supports_function_calling: true

  # ----- Gemini (nativo via API key) -----
  - model_name: gemini
    litellm_params:
      model: gemini/gemini-2.0-flash-001
      api_key: os.environ/GEMINI_API_KEY
      rpm: 360
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: gemini
    litellm_params:
      model: gemini/gemini-2.0-flash-lite-001
      api_key: os.environ/GEMINI_API_KEY
      rpm: 360
    model_info:
      mode: chat
      supports_function_calling: true

  # ----- Groq -----
  - model_name: groq
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: groq
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: groq
    litellm_params:
      model: groq/deepseek-r1-distill-llama-70b
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
    model_info:
      mode: chat
      supports_function_calling: true

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  num_retries: 2
  fallbacks:
    - openai/gpt-4o-mini: [openrouter/google/gemini-2.0-flash-001, groq/llama-3.1-8b-instant]
    - openrouter/anthropic/claude-3.5-sonnet: [openrouter/google/gemini-2.0-flash-001, groq/llama-3.3-70b-versatile]
  # Cache de respostas usando o Redis do stack (servico "redis" na ai_net).
  # Evita reprocessar a mesma pergunta/prompt repetido, economizando
  # tokens/custo real nas chamadas para os provedores pagos.
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 3600 # segundos que uma resposta fica cacheada (1h). Ajuste conforme o caso de uso.
    # Por padrao o LiteLLM cacheia por match exato de prompt+parametros.
    # Bom para perguntas repetidas identicas; nao cacheia variações de
    # frase com o mesmo significado (isso seria cache semantico, feature
    # separada e mais avancada, nao configurada aqui).

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  otel: false
  alerting: []
  # Removidas: allowed_routes, max_request_size_mb, max_response_size_mb
  # Sao recursos Enterprise do LiteLLM (exigem LITELLM_LICENSE) e, sem
  # licenca, causavam 403 em rotas como /v1/models mesmo sendo legitimas.
  # A restricao de acesso ao proxy agora e feita na camada de rede:
  # a porta do litellm no docker-compose.yml esta bindada em 127.0.0.1
  # (nao exposta na LAN), e o acesso "normal" do stack e via rede interna
  # (ai_net), atraves do python-webapp/n8n/open-webui.

router_settings:
  routing_strategy: "latency-based-routing"
  allowed_fails: 3
  num_retries: 2
  fallback_strategy: "exponential_backoff"
  context_window_fallbacks:
    - openai/gpt-4o-mini: [openrouter/google/gemini-2.0-flash-001]
  cooldown_time: 30
  # Redis do router_settings e diferente do cache configurado acima em
  # litellm_settings: esse aqui e usado para coordenar rate-limit/estado
  # entre MULTIPLAS instancias do LiteLLM rodando em paralelo. Como o
  # stack roda uma unica instancia, deixamos null (nao e necessario).
  redis_host: null
  redis_port: null
  redis_password: null