# =====================================================================
# MYCREW - docker-compose.yml
# =====================================================================
# Como usar profiles:
#   docker compose --profile core --profile tools up -d   # sobe tudo
#   docker compose --profile core up -d                   # só o essencial
#   docker compose --profile tools up -d                  # só ferramentas
#
# Dica: em vez de passar --profile toda hora, defina no .env:
#   COMPOSE_PROFILES=core,tools
# =====================================================================

# Ancora reutilizavel de logging, aplicada em todos os servicos para
# evitar que os logs crescam indefinidamente (principalmente Dozzle,
# Watchtower e n8n, que sao bem verbosos).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # =====================================================================
  # CORE - servicos essenciais para o MyCrew funcionar
  # =====================================================================

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: mycrew-ollama
    restart: unless-stopped
    profiles: ["core"]
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - ai_net
    logging: *default-logging
    # GPU support: descomente a linha abaixo se tiver nvidia-container-toolkit instalado
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: mycrew-qdrant
    restart: unless-stopped
    profiles: ["core"]
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/6333' 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: mycrew-redis
    restart: unless-stopped
    profiles: ["core"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== Banco de dados =====

  postgres:
    image: postgres:16-alpine
    container_name: mycrew-postgres
    restart: unless-stopped
    profiles: ["core"]
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mycrew}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      - POSTGRES_DB=${POSTGRES_DB:-mycrew}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mycrew} -d ${POSTGRES_DB:-mycrew}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== AI Gateway =====

  n8n:
    image: n8nio/n8n:latest
    container_name: mycrew-n8n
    restart: unless-stopped
    profiles: ["core"]
    depends_on:      
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - GENERIC_TIMEZONE=${TZ:-America/Sao_Paulo}
      - TZ=${TZ:-America/Sao_Paulo}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_EDITOR_BASE_URL=http://localhost:${N8N_PORT:-5678}
      - WEBHOOK_URL=http://localhost:${N8N_PORT:-5678}/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?Defina N8N_BASIC_AUTH_PASSWORD no .env}
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_PREFIX=mycrew
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== Backend do MyCrew =====

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mycrew-backend
    restart: unless-stopped
    profiles: ["core"]
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${MYCREW_BACKEND_PORT:-8082}:80"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_REQUEST_TIMEOUT=${OLLAMA_REQUEST_TIMEOUT:-240}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-512}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-mycrew_agent_kb}
      - QDRANT_TOP_K=${QDRANT_TOP_K:-4}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mycrew}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      - POSTGRES_DB=${POSTGRES_DB:-mycrew}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mycrew}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mycrew}
      - MYCREW_CRYPTO_KEY=${MYCREW_CRYPTO_KEY:-tYYqiZd89uNTfzGsdudmuKGAd1aBTROyAVpet8u7WEs=}
      - JWT_SECRET=${JWT_SECRET:-mycrew-jwt-secret-key-change-in-production}
    networks:
      - ai_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ===== Frontend do MyCrew =====

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mycrew-frontend
    restart: unless-stopped
    profiles: ["core"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${MYCREW_FRONTEND_PORT:-8081}:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:80
    networks:
      - ai_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-q", "-O", "/dev/null", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =====================================================================
  # TOOLS - ferramentas de apoio/observabilidade (opcionais)
  # =====================================================================

  dozzle:
    image: amir20/dozzle:latest
    container_name: mycrew-dozzle
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "${DOZZLE_PORT:-8085}:8080"
    environment:
      - DOZZLE_BASE=/dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ai_net
    logging: *default-logging

  portainer:
    image: portainer/portainer-ce:lts
    container_name: mycrew-portainer
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
      - "${PORTAINER_SSL_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - ai_net
    logging: *default-logging

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: mycrew-uptime-kuma
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "${KUMA_PORT:-3002}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - ai_net
    logging: *default-logging

volumes:
  ollama_data:
    name: mycrew_ollama_data
    external: true
  qdrant_data:
    name: mycrew_qdrant_data
    external: true
  n8n_data:
    name: mycrew_n8n_data
    external: true
  portainer_data:
    name: mycrew_portainer_data
    external: true
  uptime_kuma_data:
    name: mycrew_uptime_kuma_data
    external: true  
  postgres_data:
    name: mycrew_postgres_data
    external: true
  redis_data:
    name: mycrew_redis_data
    external: true

networks:
  ai_net:
    driver: bridge