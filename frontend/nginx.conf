# Mapa para suporte condicional a WebSocket
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# Resolvedor DNS para re-resolucao periodica de nomes dos servicos.
resolver 127.0.0.11 valid=10s;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Nao expor arquivos de configuracao/ocultos servidos junto da pasta.
  location = /nginx.conf { deny all; }
  location ~ /\.(?!well-known) { deny all; }

  # Evita cache defasado do app (JS/CSS) apos deploys.
  location ~* \.(js|css)$ {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri =404;
  }

  # Proxy do Dozzle na mesma origem para permitir o embed via iframe.
  location /dozzle/ {
    proxy_pass http://dozzle:8080/dozzle/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
  }

  location /api/ {
    # WebSocket support for SSH terminal - key headers for proper upgrade
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_pass http://python-webapp:80;
  }

  location /health {
    proxy_pass http://python-webapp:80/health;
  }
}
